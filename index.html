<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PEACOCK PLUME SCHOOL</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        height: 100vh;
        overflow: hidden;
      }

      .main-layout {
        position: relative;
        width: 100%;
        height: 100vh;
      }

      /* CENTER LOGO / VIDEO */
      .center-content {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 1;
      }

      .center-content video {
        width: 60%;
        max-width: 700px;
        height: auto;
        object-fit: contain;
      }
      .center-content {
        position: absolute;
        inset: 0;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .center-content video {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .center-content::after {
        content: "";
        position: absolute;
        inset: 0;

        background: linear-gradient(rgba(0, 0, 0, 0.25), rgba(0, 0, 0, 0.25));
      }
      .school-header {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;

        text-align: center;
        padding: 15px;

        font-size: clamp(1.5rem, 4vw, 3.5rem);
        font-weight: 900;
        letter-spacing: 5px;

        color: gold;

        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(8px);

        text-shadow:
          0 0 10px gold,
          0 0 20px gold,
          0 0 30px gold;

        z-index: 1000;
      }

      .center-content {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .center-content video {
        width: min(70vw, 700px);
        height: auto;
      }

      /* Header */
      .school-header {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 70px;
        display: flex;
        justify-content: center;
        align-items: center;
        background: rgba(0, 0, 0, 0.85);
        color: gold;
        font-size: 2rem;
        font-weight: bold;
        letter-spacing: 3px;
        z-index: 1000;
      }

      /* Navigation directly under the header */
      .left-panel {
        position: fixed;
        top: 70px; /* Same as header height */
        left: 50%;
        transform: translateX(-50%);
        z-index: 999;

        display: flex;
        justify-content: center;
        align-items: center;
        flex-wrap: wrap;
        gap: 12px;

        width: 100%;
        padding: 12px 20px;
        background: rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(8px);
      }

      /* Navigation links */
      .left-panel a {
        color: #fff;
        text-decoration: none;
        padding: 10px 18px;
        border-radius: 30px;
        background: rgba(255, 255, 255, 0.12);
        transition: 0.3s;
        font-weight: 600;
      }

      .left-panel a:hover {
        background: gold;
        color: #000;
      }

      /* Center video */
      .center-content {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        padding-top: 150px; /* Leaves space for header + menu */
      }

      .center-content video {
        width: min(70vw, 700px);
        height: auto;
        object-fit: contain;
      }

      /* Mobile */
      @media (max-width: 768px) {
        .school-header {
          font-size: 1.3rem;
          height: 60px;
        }

        .left-panel {
          top: 60px;
          gap: 8px;
          padding: 10px;
        }

        .left-panel a {
          font-size: 13px;
          padding: 8px 12px;
        }

        .center-content {
          padding-top: 180px;
        }

        .center-content video {
          width: 90%;
        }
      }
    </style>
  </head>

  <body>
    <header class="school-header">PEACOCK PLUME SCHOOL</header>

    <div class="main-layout">
      <!-- Center Logo/Video Background -->
      <div class="center-content">
        <video autoplay muted loop playsinline>
          <source src="data/side.mp4" type="video/mp4" />
        </video>
      </div>

      <!-- Floating Left Menu -->
      <div class="left-panel">
        <a href="Home.html">Home</a>
        <a href="About.html">About</a>
        <a href="Scheme-of-work.html">Scheme of Work</a>
        <a href="Management-and-staff.html">Management & Staff</a>
        <a href="Examination-Question-Bank.html">Question Bank</a>
        <a href="ReportsheetPortal.html">Report Sheet</a>
        <a href="Bursary.html">Bursary</a>
        <a href="Enquiry.html">Enquiry</a>
        <a href="youtube.html">YouTube</a>
        <a href="whatsapp.html">WhatsApp</a>
        <a href="Gmail.html">Gmail</a>
      </div>
    </div>
  </body>
</html>
